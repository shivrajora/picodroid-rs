# Hardware-in-the-loop test definitions.
# Format: app|category|timeout_secs|expected_pattern1;expected_pattern2;...
#
# Categories:
#   term  — terminates after onCreate; killed once patterns match (timeout = fail)
#   loop  — runs forever; runs for full timeout, then patterns are checked
#   hw    — needs specific peripheral wiring; skipped unless --include-hw
#   pdb   — runs a PDB command against an already-running device; skipped unless
#           CDC port found or when --skip-pdb is set
#   skip  — always skipped
#
# PDB tests use a 5th column: app|pdb|timeout|patterns|pdb_command
# Valid pdb_command values: ping, sysmon, install, install-stress
#
helloworld|term|30|HelloWorld[]:] hi Hello, World! bye 42 test 123
helloworld|pdb|15|picodroid/2\.[0-9]+.*max PAPK|ping
helloworld|pdb|15|Uptime:;Free heap:|sysmon
benchmark|term|300|TOTAL: .* ms
gcstress|term|120|=== PASSED ===
exceptiondemo|term|30|ExceptionDemo[]:] done
stringdemo|term|30|StringDemo[]:] sb charAt
arraydemo|term|30|ARRAY[]:] Sending
clinitdemo|term|30|All clinit tests passed!
enumdemo|term|30|EnumDemo[]:] === ALL PASSED ===
floatdemo|term|30|FloatDemo[]:] 355.0 / 113.0
hashmaptest|term|30|HashMapTest[]:] === ALL PASSED ===
inherit|term|30|INHERIT[]:] tricks=
interfacedemo|term|30|Animal[]:] sound=
iteratordemo|term|30|IteratorDemo[]:] === ALL PASSED ===
lambdademo|term|30|Lambda[]:] method-ref:
listdemo|term|30|ListDemo[]:] flags.get
mathsdemo|term|30|MathsDemo[]:] exp
stringtest|term|30|StringTest[]:] === ALL PASSED ===
syncdemo|term|30|SyncDemo[]:] Done. Final counter = 7
trywithresourcesdemo|term|30|TWR[]:] done
# String.format coverage — conversions, flags, precision, autoboxing, and
# IllegalFormatException. Regressions here bisect to string.format impl.
strformat|term|30|StrFormat[]:] s=\[pico\];StrFormat[]:] d=\[42\];StrFormat[]:] err=caught
# Anonymous-class dispatch + local-variable capture (year=2026).
anondemo|term|30|AnonDemo[]:] Hello from anonymous class!;AnonDemo[]:] Year=2026;AnonDemo[]:] I am A;AnonDemo[]:] I am B
# LittleFS read+write smoke test. Count value varies across runs so we only
# assert the app completed a round-trip (Boot #N).
bootcount|term|30|BootCount[]:] Boot #[0-9]+
# SharedPreferences persistence + type safety. App prints "=== ALL PASSED ==="
# iff all six subtests succeed.
prefs_demo|term|60|PrefsDemo[]:] === ALL PASSED ===
# Heap fragmentation stress — real allocator + GC on device. Previously only
# exercised under sim (test-heap.sh); this closes the sim/device divergence
# gap. 240s accommodates the peak_pressure round count on RP2350.
heapstress|term|240|HeapStress[]:] === PASSED ===
blinky|loop|30|LED[]:] on;LED[]:] off
# Executor + background pool regression. Unified main-thread FIFO must emit
# MAIN-1..3 in order and BG-1 from the background pool. Loop category because
# the Activity event loop doesn't terminate.
executordemo|loop|30|EXEC[]:] SETUP_DONE;EXEC[]:] MAIN-1;EXEC[]:] MAIN-2;EXEC[]:] MAIN-3;EXEC[]:] BG-1
# keydemo is skipped: needs synthetic key-event injection (no keyboard in
# PICODROID_SIM_HEADLESS sim, no physical buttons on current testbench).
# Re-enable under `hw` once a KeyEvent.inject helper or wired board exists.
keydemo|skip|0|
# End-to-end regression guard for the widget-callback dispatch path (shrink
# breaks widget listeners, fixed eba57c3). Each widget fires a synthetic
# LV_EVENT via the corresponding `perform*` SDK method; its listener prints a
# token. sim-run.sh runs this under both shrink modes — a mismatch on either
# side would drop a token and fail the pattern check. Category is `loop`
# because the Activity event loop doesn't terminate after onCreate.
callbacktest|loop|30|CBT[]:] SETUP_DONE;CBT[]:] BUTTON;CBT[]:] TOGGLE;CBT[]:] SWITCH;CBT[]:] CHECKBOX;CBT[]:] SEEKBAR;CBT[]:] SPINNER
blinky|pdb|90|Connected:;Installing;Install complete|install
displaydemo|pdb|90|Connected:;Installing;Install complete|install
helloworld|pdb|90|Connected:;Installing;Install complete|install
gcstress|pdb|90|Connected:;Installing;Install complete|install
threaddemo|pdb|90|Connected:;Installing;Install complete|install
blinky|pdb|600|10/10 install cycles succeeded|install-stress
# Compat-rejection coverage. Each row builds a deliberately-mismatched PAPK
# in the OPPOSITE shrink mode of the running firmware and asserts pdb
# refuses + the device stays alive (post-rejection PING liveness check
# is built into hil-run.sh's reject path).
helloworld|pdb|30|Refusing to install;framework-map-version|install-reject-host
helloworld|pdb|30|STATUS_INCOMPAT;Refusing to install|install-reject-device
# Forward-version rejection only meaningful when both sides are non-zero.
# Synthesizes a v0.<MIN+1>.0.toml on the fly, builds a PAPK against it.
helloworld|pdb|60|framework-map-version|install-reject-future
# Malformed (truncated) PAPK rejection — builds a real PAPK then truncates
# it to 100 bytes so manifest magic / framework-map-version are gone. Covers
# the realistic corruption case (partial download, bad SD card) that the
# version-mismatch rows above don't exercise.
helloworld|pdb|30|Refusing to install|install-reject-truncated
threaddemo|loop|30|Main[]:] Starting threads
adcdemo|hw|60|ADC[]:] done
i2cdemo|hw|60|I2C[]:] scan done
pwmdemo|hw|60|PWM[]:] done
spidemo|hw|60|SPI[]:] transfer done
displaydemo|skip|0|
uart|skip|0|
