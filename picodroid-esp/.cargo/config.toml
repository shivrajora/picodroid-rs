[target.xtensa-esp32s3-none-elf]
# T-Deck Plus (ESP32-S3). Requires espup toolchain and espflash.
# See ../docs/esp32s3-toolchain.md for setup instructions.
# xtensa-lx-rt provides linkall.x via its build.rs search path.
runner = "espflash flash --monitor"
linker = "xtensa-esp32s3-elf-gcc"
rustflags = [
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=-nostartfiles",
]

# Per-board build/run aliases
[alias]
b-tdeck-plus = "build -Zbuild-std=core,alloc --target xtensa-esp32s3-none-elf --no-default-features --features board-tdeck-plus"
r-tdeck-plus = "run   -Zbuild-std=core,alloc --target xtensa-esp32s3-none-elf --no-default-features --features board-tdeck-plus"

[env]
DEFMT_LOG = "debug"
"CC_xtensa-esp32s3-none-elf" = "xtensa-esp32s3-elf-gcc"
