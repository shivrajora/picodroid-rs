# MCU: ESP32-S3 (Xtensa LX7, dual-core)
family = "esp"
target = "xtensa-esp32s3-none-elf"
clock_hz = 240000000
ram_kb = 512
flash_kb = 8192
core_count = 2
# FreeRTOS keys are intentionally absent — the ESP family bypasses FreeRTOS in
# Milestone 1 (start_tasks calls app::run_jvm directly, single-threaded).
# Milestone 3 will introduce FreeRTOS-on-Xtensa and populate these fields.
