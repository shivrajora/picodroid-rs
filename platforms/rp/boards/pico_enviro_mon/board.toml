# Board: PicoEnviroMon — RP2350 + Pimoroni Pico Enviro+ Pack
mcu = "rp2350"
lv_dpi = 166
lv_mem_kb = 48
# Disable idle-timeout display sleep — this is a live environmental monitor;
# users watch the readings without interacting. Set to a positive ms value
# (e.g. 60000) to re-enable.
idle_timeout_ms = 0

# JVM tunables (CPU↔memory tradeoffs). All optional — uncomment to override.
# Canonical guide: website/src/content/docs/reference/jvm-tunables.md
# Picoenvmon is the canonical heap-constrained target (see project memory
# `project_picoenvmon_heap_budget.md`); lower `slot_chunk_shift` to 4 and
# `gc_alloc_threshold` to 128 if you hit OOM under `--shrink -r -l 384`.
# [jvm]
# gc_alloc_threshold   = 256   # 16..=8192. Lower = more frequent GC, smaller peak heap, more pauses.
# slot_chunk_shift     = 6     # 3..=8.    Chunk size = 1 << shift. Lower = smaller worst-case contiguous alloc.
# inline_array_data    = 8     # 0..=32.   Arrays of ≤N i32-slots stored inline rather than in the arena.
# activity_stack_depth = 8     # 1..=32.   Max nested Activities.
# pending_op_queue     = 8     # 1..=64.   Max queued startActivity/startService ops per frame.

[display]
driver = "st7789"
spi_id = 0
spi_freq = 62500000
# Enviro+ Pack routes SPI0 SCK/MOSI to GP18/GP19, not the chip-default GP2/GP3.
spi_sck = 18
spi_mosi = 19
pin_dc = 16
pin_cs = 17
pin_bl = 20
# pin_rst omitted — Enviro+ Pack ties RST high in hardware; build.rs emits PIN_RST = None.
width = 240
height = 240
madctl = 0x00
band_height = 27
scroll_limit = 10

[[sensor]]
kind = "bme688"
bus  = "I2C0"
addr = 0x77

[[sensor]]
kind = "ltr559"
bus  = "I2C0"
addr = 0x23

# Pimoroni Enviro+ Pack hardware buttons (A/B/X/Y → GP12-15).
# Semantic mapping: PREV→UP, NEXT→DOWN, ENTER→CENTER, ESC→BACK.
[[button]]
pin = 12
lv_key = "PREV"
keycode = 19

[[button]]
pin = 13
lv_key = "NEXT"
keycode = 20

[[button]]
pin = 14
lv_key = "ENTER"
keycode = 23

[[button]]
pin = 15
lv_key = "ESC"
keycode = 4
