# android.* -> picodroid.* compatibility aliases (schema v1).
#
# Lets app bytecode that imports android.* resolve to the real picodroid
# classes: class-shrink applies these BEFORE the shrink rewrite (composed
# into one map). Generated from the compiled SDK classes â€” every public
# picodroid class gets an android-prefixed alias (anonymous inner classes
# excluded). Regenerate after adding/removing/renaming an SDK class; the
# class-shrink drift test fails if a top-level SDK class has no alias here.
schema = 1

[[class]]
from = "android/app/Activity"
to   = "picodroid/app/Activity"

[[class]]
from = "android/app/AlertDialog"
to   = "picodroid/app/AlertDialog"

[[class]]
from = "android/app/AlertDialog$Builder"
to   = "picodroid/app/AlertDialog$Builder"

