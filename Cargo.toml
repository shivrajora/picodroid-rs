[package]
edition = "2021"
name = "picodroid"
version = "0.1.0"
license = "MIT OR Apache-2.0"

[features]
default = ["blinky", "chip-rp2040"]
helloworld = []
blinky = []
uart = []
arraydemo = []
inherit = []
interfacedemo = []
floatdemo = []
exceptiondemo = []
chip-rp2040 = ["dep:rp-pico"]
chip-rp2350 = ["dep:rp235x-hal"]

[dependencies]
heapless = "0.8"
libm = { version = "0.2", default-features = false }
cortex-m = "0.7"
cortex-m-rt = "0.7"
embedded-hal = { version = "1.0.0" }
freertos-rust = { git = "https://github.com/shivrajora/FreeRTOS-rust.git", branch = "master" }
defmt = "1"
rp-pico = { version = "0.9", optional = true }
rp235x-hal = { version = "0.4", optional = true, features = ["rt", "critical-section-impl"] }

# Hardware-specific deps only needed when targeting ARM embedded
[target.'cfg(target_arch = "arm")'.dependencies]
defmt-rtt = "1"
panic-probe = { version = "1", features = ["print-defmt"] }

[build-dependencies]
# Used to compile FreeRTOS-Kernel C source directly
cc = "1.0"
freertos-cargo-build = { git = "https://github.com/shivrajora/FreeRTOS-rust.git", branch = "master" }

# cargo build/run
[profile.dev]
codegen-units = 1
debug = 2
debug-assertions = true
incremental = false
opt-level = 3
overflow-checks = true

# cargo build/run --release
[profile.release]
codegen-units = 1
debug = 2
debug-assertions = false
incremental = false
lto = 'fat'
opt-level = 3
overflow-checks = false

# do not optimize proc-macro crates = faster builds from scratch
[profile.dev.build-override]
codegen-units = 8
debug = false
debug-assertions = false
opt-level = 0
overflow-checks = false

[profile.release.build-override]
codegen-units = 8
debug = false
debug-assertions = false
opt-level = 0
overflow-checks = false

# cargo test
[profile.test]
codegen-units = 1
debug = 2
debug-assertions = true
incremental = false
opt-level = 3
overflow-checks = true

# cargo test --release
[profile.bench]
codegen-units = 1
debug = 2
debug-assertions = false
incremental = false
lto = 'fat'
opt-level = 3
