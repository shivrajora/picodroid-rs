[workspace]
members = [".", "jvm", "tools/papk-pack", "tools/papk-info", "tools/pdb"]
resolver = "2"

[package]
edition = "2021"
name = "picodroid"
version = "0.1.0"
license = "Apache-2.0"

[features]
default = ["chip-rp2040"]
chip-rp2040 = ["dep:rp-pico"]
chip-rp2350 = ["dep:rp235x-hal"]
sim = []

[dependencies]
pico-jvm = { path = "jvm", version = "0.1" }
crc32fast = { version = "1", default-features = false }
cortex-m = "0.7"
cortex-m-rt = "0.7"
embedded-hal = { version = "1.0.0" }
freertos-rust = { version = "0.2.0", package = "freertos-rust-pd" }
defmt = "1"

# Hardware-specific deps — only compiled when targeting ARM embedded
[target.'cfg(target_arch = "arm")'.dependencies]
rp-pico = { version = "0.9", optional = true }
rp235x-hal = { version = "0.4", optional = true, features = ["rt", "critical-section-impl"] }
defmt-rtt = "1"
panic-probe = { version = "1", features = ["print-defmt"] }

[build-dependencies]
# Used to compile FreeRTOS-Kernel C source directly
cc = "1.0"
freertos-cargo-build = { version = "0.2.0", package = "freertos-cargo-build-pd" }

# cargo build/run
[profile.dev]
codegen-units = 1
debug = 2
debug-assertions = true
incremental = false
opt-level = 3
overflow-checks = true

# cargo build/run --release
[profile.release]
codegen-units = 1
debug = 2
debug-assertions = false
incremental = false
lto = 'fat'
opt-level = 3
overflow-checks = false

# do not optimize proc-macro crates = faster builds from scratch
[profile.dev.build-override]
codegen-units = 8
debug = false
debug-assertions = false
opt-level = 0
overflow-checks = false

[profile.release.build-override]
codegen-units = 8
debug = false
debug-assertions = false
opt-level = 0
overflow-checks = false

# cargo test
[profile.test]
codegen-units = 1
debug = 2
debug-assertions = true
incremental = false
opt-level = 3
overflow-checks = true

# cargo test --release
[profile.bench]
codegen-units = 1
debug = 2
debug-assertions = false
incremental = false
lto = 'fat'
opt-level = 3
