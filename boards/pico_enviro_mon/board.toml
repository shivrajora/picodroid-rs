# Board: PicoEnviroMon â€” RP2350 + Pimoroni Pico Enviro+ Pack
mcu = "rp2350"
lv_dpi = 166
lv_mem_kb = 48

[display]
driver = "st7789"
spi_id = 1
spi_freq = 62500000
pin_dc = 8
pin_cs = 9
pin_rst = 15
pin_bl = 13
width = 240
height = 135
madctl = 0x00
band_height = 27
scroll_limit = 10

[[sensor]]
kind = "bme688"
bus  = "I2C0"
addr = 0x77

# Pimoroni Enviro+ Pack hardware buttons (A/B/X/Y â†’ GP12-15).
# Semantic mapping: PREVâ†’UP, NEXTâ†’DOWN, ENTERâ†’CENTER, ESCâ†’BACK.
[[button]]
pin = 12
lv_key = "PREV"
keycode = 19

[[button]]
pin = 13
lv_key = "NEXT"
keycode = 20

[[button]]
pin = 14
lv_key = "ENTER"
keycode = 23

[[button]]
pin = 15
lv_key = "ESC"
keycode = 4
