# Board: PicoEnviroMon — RP2350 + Pimoroni Pico Enviro+ Pack
mcu = "rp2350"
lv_dpi = 166
lv_mem_kb = 48

[display]
driver = "st7789"
spi_id = 1
spi_freq = 62500000
pin_dc = 8
pin_cs = 9
pin_rst = 15
pin_bl = 13
width = 240
height = 135
madctl = 0x00
band_height = 27
scroll_limit = 10

[[sensor]]
kind = "bme688"
bus  = "I2C0"
addr = 0x77
