[target.thumbv6m-none-eabi]
# RP2040 (Cortex-M0+)
runner = "probe-rs run --chip RP2040 --protocol swd"
linker = "flip-link"
rustflags = [
  "-C", "link-arg=--nmagic",
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=-Tdefmt.x",
]

[target.thumbv8m.main-none-eabihf]
# RP2350 (Cortex-M33)
runner = "probe-rs run --chip RP235x --protocol swd"
linker = "flip-link"
rustflags = [
  "-C", "link-arg=--nmagic",
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=-Tdefmt.x",
]

[target.xtensa-esp32s3-none-elf]
# T-Deck Plus (ESP32-S3). Requires espup toolchain and espflash.
# See docs/esp32s3-toolchain.md for setup instructions.
# xtensa-lx-rt provides linkall.x via its build.rs; ldproxy passes it through.
runner = "espflash flash --monitor"
linker = "ldproxy"
rustflags = [
  "-C", "link-arg=-Tlinkall.x",
  "-C", "link-arg=-nostartfiles",
]

# Per-board build/run aliases. Bare `cargo build` no longer has a default
# target so it errors clearly — pick a board explicitly via these aliases or
# the wrapper scripts in scripts/. See docs/cargo-aliases.md.
[alias]
# Hardware builds (`cargo build --target ... --no-default-features --features ...`)
b-testbench-rp2040 = "build --target thumbv6m-none-eabi --no-default-features --features board-testbench-rp2040"
b-testbench-rp2350 = "build --target thumbv8m.main-none-eabihf --no-default-features --features board-testbench-rp2350"
b-testbench-rp2350w = "build --target thumbv8m.main-none-eabihf --no-default-features --features board-testbench-rp2350w"
b-pico-enviro-mon = "build --target thumbv8m.main-none-eabihf --no-default-features --features board-pico-enviro-mon"
b-tdeck-plus = "build --target xtensa-esp32s3-none-elf --no-default-features --features board-tdeck-plus"
# Simulator (host target — no --target so cargo picks the host triple)
b-sim = "build --no-default-features --features sim,board-testbench-rp2350"
# Hardware run (probe-rs runner from the [target.*] blocks above)
r-testbench-rp2040 = "run --target thumbv6m-none-eabi --no-default-features --features board-testbench-rp2040"
r-testbench-rp2350 = "run --target thumbv8m.main-none-eabihf --no-default-features --features board-testbench-rp2350"
r-testbench-rp2350w = "run --target thumbv8m.main-none-eabihf --no-default-features --features board-testbench-rp2350w"
r-pico-enviro-mon = "run --target thumbv8m.main-none-eabihf --no-default-features --features board-pico-enviro-mon"
r-tdeck-plus = "run --target xtensa-esp32s3-none-elf --no-default-features --features board-tdeck-plus"

[env]
DEFMT_LOG = "debug"
# Cross-compilers used by freertos-cargo-build (cc crate) to compile FreeRTOS C source
CC_thumbv6m-none-eabi = "arm-none-eabi-gcc"
"CC_thumbv8m.main-none-eabihf" = "arm-none-eabi-gcc"
# Cross-compiler for ESP32-S3 (used by any C build-deps targeting Xtensa)
"CC_xtensa-esp32s3-none-elf" = "xtensa-esp32s3-elf-gcc"
