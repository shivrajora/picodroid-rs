[target.thumbv6m-none-eabi]
# RP2040 (Cortex-M0+)
runner = "probe-rs run --chip RP2040 --protocol swd"
linker = "flip-link"
rustflags = [
  "-C", "link-arg=--nmagic",
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=-Tdefmt.x",
]

[target.thumbv8m.main-none-eabihf]
# RP2350 (Cortex-M33)
runner = "probe-rs run --chip RP235x --protocol swd"
linker = "flip-link"
rustflags = [
  "-C", "link-arg=--nmagic",
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=-Tdefmt.x",
]

# Per-board build/run aliases. Bare `cargo build` no longer has a default
# target so it errors clearly — pick a board explicitly via these aliases or
# the wrapper scripts in scripts/. See docs/cargo-aliases.md.
# ESP32-S3 (T-Deck Plus): use `cargo b-tdeck-plus` from platforms/esp/.
[alias]
# Hardware builds (`cargo build -p picodroid --target ... --no-default-features --features ...`)
b-testbench-rp2040 = "build -p picodroid --target thumbv6m-none-eabi --no-default-features --features board-testbench-rp2040"
b-testbench-rp2350 = "build -p picodroid --target thumbv8m.main-none-eabihf --no-default-features --features board-testbench-rp2350"
b-testbench-rp2350w = "build -p picodroid --target thumbv8m.main-none-eabihf --no-default-features --features board-testbench-rp2350w"
b-pico-enviro-mon = "build -p picodroid --target thumbv8m.main-none-eabihf --no-default-features --features board-pico-enviro-mon"
# Simulator (host target — no --target so cargo picks the host triple)
b-sim = "build -p picodroid --no-default-features --features sim,board-testbench-rp2350"
# Hardware run (probe-rs runner from the [target.*] blocks above)
r-testbench-rp2040 = "run -p picodroid --target thumbv6m-none-eabi --no-default-features --features board-testbench-rp2040"
r-testbench-rp2350 = "run -p picodroid --target thumbv8m.main-none-eabihf --no-default-features --features board-testbench-rp2350"
r-testbench-rp2350w = "run -p picodroid --target thumbv8m.main-none-eabihf --no-default-features --features board-testbench-rp2350w"
r-pico-enviro-mon = "run -p picodroid --target thumbv8m.main-none-eabihf --no-default-features --features board-pico-enviro-mon"

[env]
DEFMT_LOG = "debug"
# Cross-compilers used by freertos-cargo-build (cc crate) to compile FreeRTOS C source
CC_thumbv6m-none-eabi = "arm-none-eabi-gcc"
"CC_thumbv8m.main-none-eabihf" = "arm-none-eabi-gcc"
