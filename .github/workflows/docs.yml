name: Deploy docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

# Only one deploy at a time; queue subsequent runs and cancel in-progress runs
# from the same branch.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: website/package-lock.json
      - run: npm ci
      - name: Build site
        run: npm run build
        env:
          # Set BASE for the GH Pages subpath. Leaving SITE unset works
          # around an @astrojs/sitemap 3.7 + Astro 4.16 bug; pages render
          # fine on GH Pages, just no sitemap.xml is emitted.
          BASE: /picodroid-rs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
