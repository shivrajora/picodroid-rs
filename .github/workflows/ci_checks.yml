name: CI Checks

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  building:
    name: Building
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      matrix:
        # All generated code should be running on stable now
        rust: [nightly, stable]
        include:
          # Nightly is only for reference and allowed to fail
          - rust: nightly
            experimental: true
        os:
          - ubuntu-latest
          - macOS-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Install ARM toolchain and JDK (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi libnewlib-arm-none-eabi default-jdk-headless libudev-dev
      - name: Install ARM toolchain (macOS)
        if: runner.os == 'macOS'
        run: brew install arm-none-eabi-gcc
      - uses: actions/setup-java@v4
        if: runner.os == 'macOS'
        with:
          distribution: temurin
          java-version: '21'
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          targets: thumbv6m-none-eabi,thumbv8m.main-none-eabihf
      - run: cargo install flip-link
      - name: Build helloworld APK
        run: bash scripts/build-apk.sh --app helloworld
      # TestBench RP2040
      - run: PICODROID_APK_PATH=$(pwd)/build/apks/helloworld.papk cargo build -p picodroid --target thumbv6m-none-eabi --no-default-features --features board-testbench-rp2040
      - run: PICODROID_APK_PATH=$(pwd)/build/apks/helloworld.papk cargo build -p picodroid --target thumbv6m-none-eabi --no-default-features --features board-testbench-rp2040 --release
      # TestBench RP2350
      - run: PICODROID_APK_PATH=$(pwd)/build/apks/helloworld.papk cargo build -p picodroid --target thumbv8m.main-none-eabihf --no-default-features --features board-testbench-rp2350
      - run: PICODROID_APK_PATH=$(pwd)/build/apks/helloworld.papk cargo build -p picodroid --target thumbv8m.main-none-eabihf --no-default-features --features board-testbench-rp2350 --release
  testing:
    name: Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Install ARM toolchain and JDK
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi libnewlib-arm-none-eabi default-jdk-headless libudev-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: thumbv6m-none-eabi
      - run: bash scripts/test.sh
  linting:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Install ARM toolchain and JDK
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi libnewlib-arm-none-eabi default-jdk-headless libudev-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: thumbv6m-none-eabi,thumbv8m.main-none-eabihf
      - name: Build helloworld APK
        run: bash scripts/build-apk.sh --app helloworld
      # TestBench RP2040
      - run: PICODROID_APK_PATH=$(pwd)/build/apks/helloworld.papk cargo clippy -p picodroid --target thumbv6m-none-eabi --no-default-features --features board-testbench-rp2040 -- --deny=warnings
      # TestBench RP2350
      - run: PICODROID_APK_PATH=$(pwd)/build/apks/helloworld.papk cargo clippy -p picodroid --target thumbv8m.main-none-eabihf --no-default-features --features board-testbench-rp2350 -- --deny=warnings
      # Simulator (host target)
      - run: PICODROID_APK_PATH=$(pwd)/build/apks/helloworld.papk cargo clippy -p picodroid --target "$(rustc -vV | awk '/^host:/ { print $2 }')" --no-default-features --features sim,board-testbench-rp2350 -- --deny=warnings
  formatting:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          target: thumbv6m-none-eabi
      - run: cargo fmt -- --check
  java-formatting:
    name: Java Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Check Java formatting
        run: bash scripts/format_java.sh check
