name: CI Checks

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  building:
    name: Building
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      matrix:
        # All generated code should be running on stable now
        rust: [nightly, stable]
        include:
          # Nightly is only for reference and allowed to fail
          - rust: nightly
            experimental: true
        os:
          - ubuntu-latest
          - macOS-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Install ARM toolchain and JDK (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi libnewlib-arm-none-eabi default-jdk-headless libudev-dev
      - name: Install ARM toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install --cask gcc-arm-embedded || true
          VERSION=$(ls /Applications/ArmGNUToolchain | head -1)
          echo "/Applications/ArmGNUToolchain/$VERSION/arm-none-eabi/bin" >> $GITHUB_PATH
      - uses: actions/setup-java@v4
        if: runner.os == 'macOS'
        with:
          distribution: temurin
          java-version: '21'
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          targets: thumbv6m-none-eabi,thumbv8m.main-none-eabihf
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}-${{ matrix.rust }}
      # No-ops when the cached ~/.cargo/bin already holds the binary.
      - run: cargo install flip-link
      # Build via scripts/build.sh so device firmware images pick up the
      # debug-profile flash-gate (debug-assertions/overflow-checks off, ~40 KB)
      # that keeps the RP2040 image under its 896K FLASH ceiling. build.sh
      # builds the helloworld APK itself before linking the firmware.
      # TestBench RP2040
      - run: bash scripts/build.sh --board testbench_rp2040 --app helloworld
      - run: bash scripts/build.sh --board testbench_rp2040 --app helloworld --release
      # TestBench RP2350
      - run: bash scripts/build.sh --board testbench_rp2350 --app helloworld
      - run: bash scripts/build.sh --board testbench_rp2350 --app helloworld --release
  testing:
    name: Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Install ARM toolchain and JDK
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi libnewlib-arm-none-eabi default-jdk-headless libudev-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: thumbv6m-none-eabi
      - uses: Swatinem/rust-cache@v2
      # test.sh runs gradle to build the framework-embedding APK. Cache the
      # Gradle home so we don't cold-fetch every dependency from Maven Central
      # on each run — a cold fetch is what makes this lane flake on transient
      # Maven Central 403s. restore-keys keeps deps warm even on a key miss.
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-
      - run: bash scripts/test.sh
  linting:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Install ARM toolchain and JDK
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi libnewlib-arm-none-eabi default-jdk-headless libudev-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: thumbv6m-none-eabi,thumbv8m.main-none-eabihf
      - uses: Swatinem/rust-cache@v2
      - name: Check hil-tests.conf against the source tree
        run: bash scripts/check-hil-conf.sh
      - name: Build helloworld APK
        run: bash scripts/build-apk.sh --app helloworld
      # TestBench RP2040
      - run: PICODROID_APK_PATH=$(pwd)/build/apks/helloworld.papk cargo clippy -p picodroid --target thumbv6m-none-eabi --no-default-features --features board-testbench-rp2040 -- --deny=warnings
      # TestBench RP2350
      - run: PICODROID_APK_PATH=$(pwd)/build/apks/helloworld.papk cargo clippy -p picodroid --target thumbv8m.main-none-eabihf --no-default-features --features board-testbench-rp2350 -- --deny=warnings
      # Simulator (host target)
      - run: PICODROID_APK_PATH=$(pwd)/build/apks/helloworld.papk cargo clippy -p picodroid --target "$(rustc -vV | awk '/^host:/ { print $2 }')" --no-default-features --features sim,board-testbench-rp2350 -- --deny=warnings
  examples:
    name: Compile All Example APKs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Every example, both shrink modes — an SDK signature change that breaks
      # any app (or a shrink-map gap) fails here instead of shipping silently.
      - name: Assemble all PAPKs (no-shrink)
        run: ./gradlew assemblePapk --console=plain
      - name: Assemble all PAPKs (shrink)
        run: PICODROID_SHRINK=1 ./gradlew assemblePapk --console=plain
  sim-smoke:
    name: Sim Smoke Tests
    runs-on: ubuntu-latest
    env:
      # Abort loudly on any use-after-delete handle lookup (off by default;
      # see platforms/rp/.../lvgl/handle_table.rs).
      PICODROID_HANDLE_SANITIZER: '1'
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - name: Install JDK
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends default-jdk-headless libudev-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Headless end-to-end runs of a small representative subset, both shrink
      # modes (sim-run default). Full matrix stays on the nightly cron; this
      # job closes the push -> 3 AM detection window for the JVM, GC-stress,
      # stdlib (langsuite), and widget-callback dispatch paths. picoenvmon
      # rides the enviro-board smoke lane inside sim-run.sh (parity-audit
      # LVG-01/BRD-01) so the shipping board's LVGL config is CI-simulated.
      - name: Run sim smoke subset
        run: |
          for app in helloworld gcstress langsuite callbacktest picoenvmon; do
            bash scripts/sim-run.sh --app "$app" --no-email
          done
  formatting:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          target: thumbv6m-none-eabi
      - run: cargo fmt -- --check
  java-formatting:
    name: Java Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Check Java formatting
        run: bash scripts/format_java.sh check
