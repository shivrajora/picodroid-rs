name: CI Checks

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  building:
    name: Building
    continue-on-error: ${{ matrix.experimental || false }}
    strategy:
      matrix:
        # All generated code should be running on stable now
        rust: [nightly, stable]
        include:
          # Nightly is only for reference and allowed to fail
          - rust: nightly
            experimental: true
        os:
          - ubuntu-latest
          - macOS-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      - name: Install ARM toolchain and JDK (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi libnewlib-arm-none-eabi default-jdk-headless
      - name: Install ARM toolchain (macOS)
        if: runner.os == 'macOS'
        run: brew install --cask gcc-arm-embedded
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          targets: thumbv6m-none-eabi,thumbv8m.main-none-eabihf
      - run: cargo install flip-link
      # RP2040 (default features)
      - run: cargo build --all
      - run: cargo build --all --release
      # RP2350
      - run: cargo build --target thumbv8m.main-none-eabihf --no-default-features --features blinky,chip-rp2350
      - run: cargo build --target thumbv8m.main-none-eabihf --no-default-features --features blinky,chip-rp2350 --release
  testing:
    name: Testing
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      - name: Install ARM toolchain and JDK
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi libnewlib-arm-none-eabi default-jdk-headless
      - uses: dtolnay/rust-toolchain@stable
        with:
          target: thumbv6m-none-eabi
      - run: cargo test --target "$(rustc -vV | awk '/^host:/ { print $2 }')"
  linting:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      - name: Install ARM toolchain and JDK
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends gcc-arm-none-eabi libnewlib-arm-none-eabi default-jdk-headless
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
          targets: thumbv6m-none-eabi,thumbv8m.main-none-eabihf
      # RP2040
      - run: cargo clippy --no-default-features --features helloworld,chip-rp2040 -- --deny=warnings
      - run: cargo clippy --no-default-features --features blinky,chip-rp2040 -- --deny=warnings
      - run: cargo clippy --no-default-features --features uart,chip-rp2040 -- --deny=warnings
      # RP2350
      - run: cargo clippy --target thumbv8m.main-none-eabihf --no-default-features --features helloworld,chip-rp2350 -- --deny=warnings
      - run: cargo clippy --target thumbv8m.main-none-eabihf --no-default-features --features blinky,chip-rp2350 -- --deny=warnings
      - run: cargo clippy --target thumbv8m.main-none-eabihf --no-default-features --features uart,chip-rp2350 -- --deny=warnings
  formatting:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          target: thumbv6m-none-eabi
      - run: cargo fmt -- --check
  java-formatting:
    name: Java Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Check Java formatting
        run: bash scripts/format_java.sh check
